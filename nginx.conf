# Nginx configuration for Grandma's Hive SPA
# Place this inside your server block

# Redirect non-www to www
if ($host = 'grandmashive.com') {
    return 301 https://www.grandmashive.com$request_uri;
}

# Force HTTPS
if ($scheme != "https") {
    return 301 https://$host$request_uri;
}

# Serve static files with long cache
location ~* \.(png|jpg|jpeg|gif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# React Router fallback - serve index.html for all routes
location / {
    try_files $uri $uri/ /index.html;
}

# API proxy (if using Express backend)
location /api {
    proxy_pass http://localhost:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
}
